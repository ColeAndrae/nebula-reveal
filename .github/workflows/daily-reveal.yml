name: 🌌 Daily Nebula Reveal

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow

      - name: Configure git
        run: |
          git config user.name "ColeAndrae"
          git config user.email "cole@theandraes.com"

      - name: Plan today's batches
        run: python reveal.py plan

      - name: Reveal each batch as its own commit
        run: |
          num_batches=$(python -c "import json; print(len(json.load(open('pixels_today.json'))))")
          if [ "$num_batches" -eq 0 ]; then
            echo "Done!"
            exit 0
          fi
          for i in $(seq 0 $((num_batches - 1))); do
            python reveal.py $i
            pct=$(python -c "import json; s=json.load(open('state.json')); print(f\"{s['pixels_revealed']}/300502\")")
            git add current.png current_large.png state.json README.md
            git commit -m "🌌 Batch $i — $pct pixels"
          done
          git push origin main
